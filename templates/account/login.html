{% extends 'base.html' %}
{% load static %}

{% block body_block %}

<div class="container mt-5 mb-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header text-center bg-primary text-white">

<h3>Đăng nhập</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Tên đăng nhập</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Mật khẩu</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="d-grid">

<button class="btn btn-primary">

Đăng nhập

</button>

</div>

</form>

<hr>

<div class="text-center">

Chưa có tài khoản?

<a href="{% url 'register' %}">

Đăng ký ngay

</a>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
